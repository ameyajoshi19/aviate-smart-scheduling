<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aviate — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    h1 { font-size: 24px; letter-spacing: 8px; color: #1A2D4F; font-weight: 700; }
    p  { color: #6b7a99; font-size: 14px; margin: 10px 0 40px; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    a.card {
      display: block;
      width: 240px;
      padding: 28px 24px;
      background: #fff;
      border: 1px solid #dde3ee;
      border-radius: 16px;
      text-decoration: none;
      color: #1A2D4F;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      transition: box-shadow 0.2s;
    }
    a.card:hover { box-shadow: 0 4px 20px rgba(26,45,79,0.12); }
    a.card span { display: block; font-size: 13px; font-weight: 400; color: #6b7a99; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>AVIATE</h1>
  <p>Smart scheduling, perfectly prioritized</p>
  <div class="cards">
    <a class="card" href="privacy.html">
      Privacy Policy
      <span>How we handle your data</span>
    </a>
    <a class="card" href="terms.html">
      Terms of Service
      <span>Rules for using Aviate</span>
    </a>
  </div>
</body>
</html>
